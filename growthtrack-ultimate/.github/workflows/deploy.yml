name: Deploy & CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Step 1: Run all tests and build ──────────────────────────────────────────
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: growthtrack-ultimate
    outputs:
      build-success: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: growthtrack-ultimate/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit/Component Tests (gate — must pass before deploy)
        run: npm run test:run

      - name: Build Application
        id: build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: growthtrack-ultimate/dist
          retention-days: 1

  # ── Step 2: Deploy only if tests + build passed ──────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test-and-build          # ← hard gate: this job is SKIPPED if test-and-build fails
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
