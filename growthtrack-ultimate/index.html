<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ultimate — GrowthTrack Digital Twin Engine. Photorealistic 3D body analysis, health tracking, and personal transformation dashboard." />
    <meta property="og:title" content="Ultimate — Digital Twin Engine" />
    <meta property="og:description" content="AI-powered personal transformation dashboard with 3D body analysis, health tracking, and goal projection." />
    <title>Ultimate — Digital Twin Engine</title>
    <!-- FOUC Prevention: Apply theme before React hydrates to avoid flash -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('growthtrack-ultimate-v4');
          if (stored) {
            var state = JSON.parse(stored);
            var theme = state?.state?.theme || 'dark';
            var palette = state?.state?.palette || 'gold';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-palette', palette);
            if (theme === 'amoled' || theme === 'dark') {
              document.documentElement.style.backgroundColor = theme === 'amoled' ? '#000000' : '#0c0d12';
            }
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.setAttribute('data-palette', 'gold');
            document.documentElement.style.backgroundColor = '#0c0d12';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
