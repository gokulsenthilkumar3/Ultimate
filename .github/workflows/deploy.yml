name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - restructure
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge growthtrack-ultimate source into ultimate
        run: |
          # Copy all source files from growthtrack-ultimate into ultimate/
          # ultimate/ overrides take precedence (App.jsx, store/userStore.js, Info.jsx etc)
          rsync -av --ignore-existing growthtrack-ultimate/src/ ultimate/src/
          rsync -av --ignore-existing growthtrack-ultimate/public/ ultimate/public/
          rsync -av --ignore-existing dashboard-app/src/components/ ultimate/src/components/
          rsync -av --ignore-existing dashboard-app/src/data/ ultimate/src/data/
          rsync -av --ignore-existing dashboard-app/src/store/ ultimate/src/store/
          rsync -av --ignore-existing dashboard-app/src/workers/ ultimate/src/workers/

      - name: Install dependencies
        working-directory: ./ultimate
        run: npm install

      - name: Build
        working-directory: ./ultimate
        run: npm run build
        env:
          VITE_BRANCH: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ultimate/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
