name: CI → Test → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.1'
          cache: 'npm'
          cache-dependency-path: growthtrack-ultimate/package-lock.json

      - name: Install Dependencies
        working-directory: growthtrack-ultimate
                  run: npm install

      - name: Run Vitest Tests
        working-directory: growthtrack-ultimate
        run: npm run test:run
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.1'
          cache: 'npm'
          cache-dependency-path: growthtrack-ultimate/package-lock.json

      - name: Install Dependencies
        working-directory: growthtrack-ultimate
                  run: npm install

      - name: Build Application
        working-directory: growthtrack-ultimate
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Add cache-busting headers
        working-directory: growthtrack-ultimate/dist
        run: |
          cp index.html 404.html
          echo '{ "headers": [{ "source": "**/*.js", "headers": [{ "key": "Cache-Control", "value": "no-cache, no-store, must-revalidate" }] }] }' > _headers

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: growthtrack-ultimate/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
