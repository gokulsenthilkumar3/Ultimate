name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - restructure
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge source into ultimate
        run: |
          # Copy growthtrack-ultimate components/hooks/data/workers/css into ultimate/src
          # EXCLUDE files that already exist in ultimate/ (App.jsx, store/, Info.jsx)
          rsync -av --exclude='App.jsx' --exclude='main.jsx' --exclude='store/' growthtrack-ultimate/src/ ultimate/src/
          rsync -av growthtrack-ultimate/public/ ultimate/public/
          # Add unique new files from dashboard-app
          cp -n dashboard-app/src/components/EditableMetric.jsx ultimate/src/components/ 2>/dev/null || true
          cp -n dashboard-app/src/components/BodyPartOverlay.jsx ultimate/src/components/ 2>/dev/null || true
          cp -n dashboard-app/src/components/BodyPartOverlay.css ultimate/src/components/ 2>/dev/null || true
          cp -n dashboard-app/src/workers/metricsWorker.js ultimate/src/workers/ 2>/dev/null || true
          echo 'Merge done'
          ls ultimate/src/components/ | head -30

      - name: Install dependencies
        working-directory: ./ultimate
        run: npm install

      - name: Build
        working-directory: ./ultimate
        run: npm run build
        env:
          VITE_BRANCH: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ultimate/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
