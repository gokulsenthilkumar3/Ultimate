name: GrowthTrack CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./growthtrack-ultimate
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ./growthtrack-ultimate/package-lock.json
      - run: npm install
      - run: npm test
        env:
          VITE_API_BASE: http://localhost:3001/api

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      - run: npm install
      - run: npm test
        env:
          NODE_ENV: test
          FIREBASE_ENABLED: 'false'
