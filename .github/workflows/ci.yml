name: GrowthTrack CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./growthtrack-ultimate
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./growthtrack-ultimate/package-lock.json
      - run: npm ci
      - run: npm run test:run
        env:
          VITE_API_BASE: http://localhost:3001/api

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      - run: npm ci
      # Use the project-level vitest config (sets up in-memory SQLite via setupFiles)
      - run: npx vitest run --config vitest.config.js
        env:
          DB_PATH: ':memory:'
          NODE_ENV: test
          SUPABASE_URL: 'https://placeholder.supabase.co'
          SUPABASE_KEY: 'placeholder-anon-key'

  build-frontend:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./growthtrack-ultimate
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./growthtrack-ultimate/package-lock.json
      - run: npm ci
      - run: npm run build
